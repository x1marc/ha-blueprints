blueprint:
  name: Alexa Timer → AWTRIX 3 (v1.4)
  description: >
    Zeigt den nächsten Alexa-Timer als Live-Countdown auf einem AWTRIX-3-Display
    (Ulanzi / awtrix-light) an und löst beim Ablauf einen Alarm aus.

    Ersetzt den alten Aufbau aus 2 Template-Sensoren + 4 Automationen durch
    EINE einzige Automation:

      • Der Countdown wird inline aus dem Alexa-Timer-Sensor berechnet
        (kein separater Template-Sensor, kein homeassistant.update_entity-Loop).
      • Aktualisierung im Sekundentakt per time_pattern-Trigger (mode: restart,
        also keine konkurrierenden repeat-while-Schleifen mehr).
      • Beim Ablauf wird ein Alarm über .../notify gesendet.

    Anzeige-Modus (wählbar):
      • "Im App-Wechsel": Custom App (Topic .../custom/<name>) — rotiert mit den
        übrigen AWTRIX-Apps im Loop. Flackerfrei, firmware-native für Live-Werte.
      • "Nur Timer anpinnen": gehaltene Notification (hold:true) — überdeckt alle
        anderen Apps, bis der Timer endet. Kein App-Wechsel.

    Voraussetzungen:
      • MQTT-Integration aktiv und AWTRIX per MQTT verbunden.
      • Quelle ist der "next timer"-Sensor von Alexa Media Player (HACS),
        z. B. sensor.alexa_wohnzimmer_next_timer. Es wird das Attribut "active"
        ausgewertet (Liste mit triggerTime je Timer) — NICHT der State, da dieser
        bei AMP unzuverlässig ist (abgelaufene Timer bleiben als Leichen hängen).

    Hinweis: Die nächste Timer-Zielzeit kommt aus dem Attribut active[].triggerTime
    (absolute Unix-Zeit). Alte/abgelaufene Timer liegen in der Vergangenheit und
    werden ignoriert. Der Alarm feuert nur, wenn die Zielzeit gerade eben
    (innerhalb ~1,5 s) erreicht wurde — Stellen, Abbrechen oder "ON"-Leichen
    lösen keinen Fehlalarm mehr aus.

    Changelog:
      v1.4 - Quelle umgestellt: nutzt jetzt Attribut active[].triggerTime statt
             des unzuverlässigen Sensor-State. Behebt "sofort LOS", das durch
             abgelaufene 'ON'-Timer-Leichen mit vergangener Zeit entstand
             (Alexa-Media-Player-Eigenheit). Rechnet in UTC-Epoch (zeitzonensicher).
      v1.3 - Fehlalarm-Fix v2: Ablauf wird jetzt zeitbasiert erkannt (Ziel
             innerhalb der letzten ~1,5 s erreicht) statt über den wackeligen
             Sensor-Statuswechsel. Behebt "sofort LOS beim Timer-Stellen", das
             durch Polling-Verzögerung des Alexa-Sensors entstand. Option
             "Alarm bei rechnerischer 0" entfernt (nicht mehr nötig).
      v1.2 - Fehlalarm-Fix (unvollständig): Prüfung des vorherigen Zeitstempels
             via trigger.from_state. Half nicht gegen die Polling-Verzögerung.
      v1.1 - Anzeige-Modus "Nur Timer anpinnen" (gehaltene Notification);
             Farbauswahl per Farbrad (color_rgb); Alarm-Effekt als Dropdown
             (gültige AWTRIX-Effektnamen); Blinken des Alarm-Textes optional.
      v1.0 - Erstausgabe: ein Sensor + eine Automation ersetzen den alten
             Aufbau aus 2 Template-Sensoren + 4 Automationen.

  domain: automation
  source_url: https://github.com/x1marc/ha-blueprints/blob/main/alexa_timer_awtrix.yaml

  input:
    # ─── ⏱️ QUELLE ────────────────────────────────────────────────
    source_timer:
      name: Alexa Timer-Sensor
      description: >
        Der "next timer"-Sensor von Alexa Media Player. Sein State muss ein
        Zeitstempel des nächsten Timers sein (oder unavailable, wenn keiner läuft).
      selector:
        entity:
          filter:
            - domain: sensor

    # ─── 📟 AWTRIX ────────────────────────────────────────────────
    awtrix_prefix:
      name: AWTRIX MQTT-Topic-Präfix
      description: >
        Das Topic-Präfix des Geräts (steht in den AWTRIX-Geräteeinstellungen,
        Standard: "awtrix"). Es wird "/custom/<App>", "/notify" bzw.
        "/notify/dismiss" angehängt.
      default: "awtrix"
      selector:
        text: {}

    app_name:
      name: Name der Custom App
      description: >
        Interner Name der AWTRIX-App für den Countdown (Topic .../custom/<Name>).
        Nur im Modus "Im App-Wechsel" relevant.
      default: "alexatimer"
      selector:
        text: {}

    # ─── 🖥️ ANZEIGE-MODUS ─────────────────────────────────────────
    display_mode:
      name: Anzeige-Modus
      description: >
        "Im App-Wechsel": Timer rotiert als App mit den übrigen AWTRIX-Apps.
        "Nur Timer anpinnen": Timer wird gehalten und überdeckt alle anderen
        Apps, bis er abläuft (kein App-Wechsel).
      default: app
      selector:
        select:
          options:
            - label: "Im App-Wechsel (rotiert mit anderen Apps)"
              value: app
            - label: "Nur Timer anpinnen (kein App-Wechsel)"
              value: pinned

    # ─── 🎨 COUNTDOWN-ANZEIGE ─────────────────────────────────────
    countdown_color:
      name: Farbe des Countdowns
      description: Farbe für den Countdown-Text (Farbrad).
      default: [172, 7, 242]
      selector:
        color_rgb: {}

    countdown_icon:
      name: Icon (optional)
      description: >
        AWTRIX-Icon-ID für die Countdown-Anzeige (leer = kein Icon).
      default: ""
      selector:
        text: {}

    always_show_hours:
      name: Stunden immer anzeigen
      description: >
        Aus = HH nur anzeigen, wenn > 0 (sonst MM:SS). An = immer H:MM:SS.
      default: false
      selector:
        boolean: {}

    # ─── 🔔 ALARM ─────────────────────────────────────────────────
    alarm_text:
      name: Alarm-Text
      description: Text, der beim Ablauf des Timers angezeigt wird.
      default: "!!!LOS!!!"
      selector:
        text: {}

    alarm_color:
      name: Alarm-Farbe
      description: Farbe des Alarm-Textes (Farbrad).
      default: [255, 0, 0]
      selector:
        color_rgb: {}

    alarm_blink:
      name: Alarm-Text blinken
      description: >
        An = der Alarm-Text blinkt. Aus = der Text steht still (besser lesbar,
        vor allem in Kombination mit einem Hintergrundeffekt).
      default: true
      selector:
        boolean: {}

    alarm_duration:
      name: Alarm-Anzeigedauer (Sekunden)
      default: 10
      selector:
        number:
          min: 1
          max: 60
          unit_of_measurement: s
          mode: slider

    alarm_effect:
      name: Alarm-Effekt
      description: >
        AWTRIX-Hintergrundeffekt für den Alarm. "Kein Effekt" zeigt nur Text +
        Farbe. Die Auswahl enthält die gültigen Effektnamen der AWTRIX-3-Firmware
        (awtrix-light) — so sind Tippfehler ausgeschlossen.
      default: "PlasmaCloud"
      selector:
        select:
          options:
            - label: "Kein Effekt"
              value: "none"
            - label: "Fade"
              value: "Fade"
            - label: "MovingLine"
              value: "MovingLine"
            - label: "BrickBreaker"
              value: "BrickBreaker"
            - label: "PingPong"
              value: "PingPong"
            - label: "Radar"
              value: "Radar"
            - label: "Checkerboard"
              value: "Checkerboard"
            - label: "Fireworks"
              value: "Fireworks"
            - label: "PlasmaCloud"
              value: "PlasmaCloud"
            - label: "Ripple"
              value: "Ripple"
            - label: "Snake"
              value: "Snake"
            - label: "Pacifica"
              value: "Pacifica"
            - label: "TheaterChase"
              value: "TheaterChase"
            - label: "Plasma"
              value: "Plasma"
            - label: "Matrix"
              value: "Matrix"
            - label: "SwirlIn"
              value: "SwirlIn"
            - label: "SwirlOut"
              value: "SwirlOut"
            - label: "LookingEyes"
              value: "LookingEyes"
            - label: "TwinklingStars"
              value: "TwinklingStars"
            - label: "ColorWaves"
              value: "ColorWaves"

mode: restart
max_exceeded: silent

variables:
  source_timer: !input source_timer
  awtrix_prefix: !input awtrix_prefix
  app_name: !input app_name
  display_mode: !input display_mode
  countdown_color: !input countdown_color
  countdown_icon: !input countdown_icon
  always_show_hours: !input always_show_hours
  alarm_text: !input alarm_text
  alarm_color: !input alarm_color
  alarm_blink: !input alarm_blink
  alarm_duration: !input alarm_duration
  alarm_effect: !input alarm_effect
  topic_custom: "{{ awtrix_prefix }}/custom/{{ app_name }}"
  topic_notify: "{{ awtrix_prefix }}/notify"
  topic_dismiss: "{{ awtrix_prefix }}/notify/dismiss"
  # WICHTIG: Der STATE des Alexa-Sensors ist als Quelle unbrauchbar — abgelaufene
  # Timer bleiben dort als "ON"-Leichen mit vergangener Zeit hängen (AMP-Bug).
  # Wir lesen stattdessen die absolute Zielzeit (triggerTime, Unix-ms) aus dem
  # Attribut "active", filtern echte zukünftige Timer und rechnen in UTC-Epoch
  # (zeitzonensicher).
  #
  # Sekunden bis zum nächsten echten Timer: Zahl (auch leicht negativ direkt
  # nach Ablauf) oder "none" (kein Timer). 1,5 s Karenz, damit der Moment des
  # Ablaufs (secs_left <= 0) sicher erfasst wird; alte Leichen liegen weiter in
  # der Vergangenheit und fallen heraus.
  secs_left: >
    {% set items = state_attr(source_timer, 'active') or [] %}
    {% set now_ms = now().timestamp() * 1000 %}
    {% set fut = items | selectattr('triggerTime', 'defined')
                       | selectattr('triggerTime', 'gt', now_ms - 1500)
                       | map(attribute='triggerTime') | list %}
    {% if fut | length > 0 %}
      {{ ((fut | min) / 1000 - now().timestamp()) | round(1) }}
    {% else %}
      none
    {% endif %}
  # Timer läuft (Ziel noch in der Zukunft)?
  counting: "{{ secs_left != 'none' and (secs_left | float(-99999)) > 0 }}"
  # Timer GERADE EBEN abgelaufen (Ziel innerhalb der letzten ~1,5 s erreicht)?
  just_expired: "{{ secs_left != 'none' and (secs_left | float(99999)) <= 0 }}"
  # Ist in den letzten alarm_duration Sekunden ein Timer abgelaufen? Schützt den
  # laufenden Alarm davor, durch ein Lösch-Event vorzeitig beendet zu werden.
  recently_fired: >
    {% set items = state_attr(source_timer, 'active') or [] %}
    {% set now_ms = now().timestamp() * 1000 %}
    {% set win = (alarm_duration | int(10) + 2) * 1000 %}
    {% set r = items | selectattr('triggerTime', 'defined')
                     | selectattr('triggerTime', 'gt', now_ms - win)
                     | selectattr('triggerTime', 'le', now_ms) | list %}
    {{ r | length > 0 }}
  # Formatierter Countdown-Text (MM:SS oder H:MM:SS)
  countdown_text: >
    {% set s = [secs_left | float(0), 0] | max | int %}
    {% set h = s // 3600 %}{% set m = (s % 3600) // 60 %}{% set sec = s % 60 %}
    {% if always_show_hours or h > 0 %}{{ '%d:%02d:%02d' | format(h, m, sec) }}{% else %}{{ '%02d:%02d' | format(m, sec) }}{% endif %}

triggers:
  - trigger: time_pattern
    seconds: "/1"
    id: tick
  - trigger: state
    entity_id: !input source_timer
    id: source

conditions: []

actions:
  - choose:
      # ── Timer GERADE EBEN abgelaufen: Alarm + Anzeige aufräumen ──
      - conditions:
          - condition: template
            value_template: "{{ just_expired | bool }}"
        sequence:
          # Alarm anzeigen (ersetzt im Pinned-Modus automatisch den Countdown,
          # da stack:false). Kein separates dismiss nötig.
          - action: mqtt.publish
            data:
              topic: "{{ topic_notify }}"
              payload: >-
                {"text":"{{ alarm_text }}","color":{{ alarm_color | to_json }},"center":true,"duration":{{ alarm_duration }},"wakeup":true{% if alarm_blink %},"blinkText":700{% endif %}{% if alarm_effect not in ['none', '', None] %},"effect":"{{ alarm_effect }}"{% endif %}}
          # Custom App entfernen (nur App-Modus)
          - if:
              - condition: template
                value_template: "{{ display_mode == 'app' }}"
            then:
              - action: mqtt.publish
                data:
                  topic: "{{ topic_custom }}"
                  payload: ""

      # ── Timer läuft: Countdown anzeigen ─────────────────────────
      - conditions:
          - condition: template
            value_template: "{{ counting | bool }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ display_mode == 'pinned' }}"
            then:
              # Angepinnt: gehaltene Notification, überdeckt andere Apps
              - action: mqtt.publish
                data:
                  topic: "{{ topic_notify }}"
                  payload: >-
                    {"text":"{{ countdown_text }}","color":{{ countdown_color | to_json }},"pushIcon":0,"hold":true,"stack":false,"wakeup":true{% if countdown_icon %},"icon":"{{ countdown_icon }}"{% endif %}}
            else:
              # Im App-Wechsel: Custom App
              - action: mqtt.publish
                data:
                  topic: "{{ topic_custom }}"
                  payload: >-
                    {"text":"{{ countdown_text }}","color":{{ countdown_color | to_json }},"pushIcon":0,"duration":5{% if countdown_icon %},"icon":"{{ countdown_icon }}"{% endif %}}

      # ── Kein Timer mehr (abgebrochen/entfernt): Anzeige löschen ─────
      # Nur bei einem Änderungs-Event (source), nicht bei jedem Tick → kein
      # MQTT-Spam. "not recently_fired" schützt den gerade laufenden Alarm.
      - conditions:
          - condition: template
            value_template: >-
              {{ trigger.id == 'source' and secs_left == 'none'
                 and not (recently_fired | bool) }}
        sequence:
          - if:
              - condition: template
                value_template: "{{ display_mode == 'pinned' }}"
            then:
              - action: mqtt.publish
                data:
                  topic: "{{ topic_dismiss }}"
                  payload: ""
            else:
              - action: mqtt.publish
                data:
                  topic: "{{ topic_custom }}"
                  payload: ""
    # ── Idle-Tick ohne Timer: nichts tun (vermeidet MQTT-Spam) ────
    default: []
