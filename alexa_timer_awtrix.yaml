blueprint:
  name: Alexa Timer → AWTRIX 3 (v1.9)
  description: >
    Zeigt den nächsten Alexa-Timer als Live-Countdown auf einem AWTRIX-3-Display
    (Ulanzi / awtrix-light) an und löst beim Ablauf einen Alarm aus.

    Ersetzt den alten Aufbau aus 2 Template-Sensoren + 4 Automationen durch
    EINE einzige Automation:

      • Der Countdown wird inline aus dem STATE des Alexa-Timer-Sensors berechnet
        (kein separater Template-Sensor, kein homeassistant.update_entity-Loop,
        kein Helfer).
      • Sekundengenaue Aktualisierung in einer Schleife, die NUR während eines
        laufenden Timers läuft. KEIN Sekunden-Trigger -> im Leerlauf null Last.
      • Beim Ablauf wird ein Alarm über .../notify gesendet.

    Anzeige-Modus (wählbar):
      • "Im App-Wechsel": Custom App (Topic .../custom/<name>) — rotiert mit den
        übrigen AWTRIX-Apps im Loop. Flackerfrei, firmware-native für Live-Werte.
      • "Nur Timer anpinnen": gehaltene Notification (hold:true) — überdeckt alle
        anderen Apps, bis der Timer endet. Kein App-Wechsel.

    Voraussetzungen:
      • MQTT-Integration aktiv und AWTRIX per MQTT verbunden.
      • Quelle ist der "next timer"-Sensor von Alexa Media Player (HACS),
        z. B. sensor.alexa_wohnzimmer_next_timer. Bei laufendem Timer steht im
        STATE die Zielzeit (ISO-Zeitstempel in der Zukunft); ohne Timer ein
        unbrauchbarer Wert (~jetzt) — der wird ignoriert.

    Funktionsweise (einfach wie im Original):
      • "Timer läuft"     = STATE in der Zukunft -> Countdown-Schleife.
      • "Zeit erreicht"   = Schleife läuft bis zur Zielzeit -> Alarm. Der Alarm
                            kommt AUSSCHLIESSLICH vom Erreichen der Zielzeit,
                            daher NIE ein Fehlalarm beim Stellen/Abbrechen.
      • "Kein Timer mehr" = Sensor zeigt keinen Zukunfts-Timer (Abbruch ->
                            unavailable/Müll) -> AWTRIX-Anzeige löschen.

    Changelog:
      v1.9 - Zielzeit wird jetzt per "variables"-Schritt fest eingefroren
             (locked_target). Behebt, dass die Schleife bei 00:00 "klebte" und
             LOS erst beim Beenden des Timers kam (die gemerkte Zielzeit wurde
             im Schleifen-Kontext faktisch live neu berechnet).
      v1.8 - LOS kommt jetzt PÜNKTLICH bei 00:00: Zielzeit wird beim Start
             gemerkt (target_epoch) und der Alarm exakt bei Erreichen ausgelöst.
             Behebt das "klebt bei 00:00 bis Timer-Aus": beim Klingeln bleibt der
             Alexa-Sensor auf ~jetzt stehen, was die alte Live-Berechnung
             blockierte. mode: single (statt restart), damit der Zustandswechsel
             im Ablauf-Moment die Schleife nicht abbricht; Abbruch wird in der
             Schleife selbst erkannt. Alarm bleibt stehen, bis der Timer auf
             Alexa beendet wird (-> unavailable -> löschen).
      v1.7 - Vereinfacht (wie das funktionierende Original): Alarm NUR beim
             Erreichen der Zielzeit (Schleifenende). Abbruch-Erkennung ersetzt
             durch simples "kein laufender Timer -> Anzeige löschen" -> behebt
             das Nicht-Löschen beim Abbrechen. from_state-Raterei entfernt.
      v1.6 - Sekunden-Trigger entfernt -> keine Dauerlast im Leerlauf. Countdown
             läuft in einer Schleife nur während eines aktiven Timers; getriggert
             nur bei Zustandsänderung des Sensors + HA-Start.
      v1.5 - Zurück zur einfachen State-Quelle OHNE Helfer/Attribute. Ablauf wird
             beim State-Wechsel erkannt, wenn die vorherige Zielzeit im engen
             Fenster (−2…+5 s) erreicht wurde. Behebt "sofort LOS": alter Müll
             und das Timer-Stellen liegen außerhalb des Fensters.
      v1.4 - (verworfen) Attribut active[].triggerTime — bei AMP oft leer/None.
      v1.3 - (verworfen) zeitbasiert, scheiterte an unzuverlässigem State.
      v1.2 - Fehlalarm-Fix (unvollständig): from_state ohne obere Fenstergrenze.
      v1.1 - Anzeige-Modus "Nur Timer anpinnen"; Farbrad (color_rgb); Alarm-Effekt
             als Dropdown; Blinken des Alarm-Textes optional.
      v1.0 - Erstausgabe: ein Sensor + eine Automation statt 2 Sensoren + 4
             Automationen.

  domain: automation
  source_url: https://github.com/x1marc/ha-blueprints/blob/main/alexa_timer_awtrix.yaml

  input:
    # ─── ⏱️ QUELLE ────────────────────────────────────────────────
    source_timer:
      name: Alexa Timer-Sensor
      description: >
        Der "next timer"-Sensor von Alexa Media Player. Bei laufendem Timer ist
        sein STATE die Zielzeit (ISO-Zeitstempel in der Zukunft).
      selector:
        entity:
          filter:
            - domain: sensor

    # ─── 📟 AWTRIX ────────────────────────────────────────────────
    awtrix_prefix:
      name: AWTRIX MQTT-Topic-Präfix
      description: >
        Das Topic-Präfix des Geräts (steht in den AWTRIX-Geräteeinstellungen,
        Standard: "awtrix"). Es wird "/custom/<App>", "/notify" bzw.
        "/notify/dismiss" angehängt.
      default: "awtrix"
      selector:
        text: {}

    app_name:
      name: Name der Custom App
      description: >
        Interner Name der AWTRIX-App für den Countdown (Topic .../custom/<Name>).
        Nur im Modus "Im App-Wechsel" relevant.
      default: "alexatimer"
      selector:
        text: {}

    # ─── 🖥️ ANZEIGE-MODUS ─────────────────────────────────────────
    display_mode:
      name: Anzeige-Modus
      description: >
        "Im App-Wechsel": Timer rotiert als App mit den übrigen AWTRIX-Apps.
        "Nur Timer anpinnen": Timer wird gehalten und überdeckt alle anderen
        Apps, bis er abläuft (kein App-Wechsel).
      default: app
      selector:
        select:
          options:
            - label: "Im App-Wechsel (rotiert mit anderen Apps)"
              value: app
            - label: "Nur Timer anpinnen (kein App-Wechsel)"
              value: pinned

    # ─── 🎨 COUNTDOWN-ANZEIGE ─────────────────────────────────────
    countdown_color:
      name: Farbe des Countdowns
      description: Farbe für den Countdown-Text (Farbrad).
      default: [172, 7, 242]
      selector:
        color_rgb: {}

    countdown_icon:
      name: Icon (optional)
      description: >
        AWTRIX-Icon-ID für die Countdown-Anzeige (leer = kein Icon).
      default: ""
      selector:
        text: {}

    always_show_hours:
      name: Stunden immer anzeigen
      description: >
        Aus = HH nur anzeigen, wenn > 0 (sonst MM:SS). An = immer H:MM:SS.
      default: false
      selector:
        boolean: {}

    # ─── 🔔 ALARM ─────────────────────────────────────────────────
    alarm_text:
      name: Alarm-Text
      description: Text, der beim Ablauf des Timers angezeigt wird.
      default: "!!!LOS!!!"
      selector:
        text: {}

    alarm_color:
      name: Alarm-Farbe
      description: Farbe des Alarm-Textes (Farbrad).
      default: [255, 0, 0]
      selector:
        color_rgb: {}

    alarm_blink:
      name: Alarm-Text blinken
      description: >
        An = der Alarm-Text blinkt. Aus = der Text steht still (besser lesbar,
        vor allem in Kombination mit einem Hintergrundeffekt).
      default: true
      selector:
        boolean: {}

    alarm_duration:
      name: Alarm-Anzeigedauer (Sekunden)
      default: 10
      selector:
        number:
          min: 1
          max: 60
          unit_of_measurement: s
          mode: slider

    alarm_effect:
      name: Alarm-Effekt
      description: >
        AWTRIX-Hintergrundeffekt für den Alarm. "Kein Effekt" zeigt nur Text +
        Farbe. Die Auswahl enthält die gültigen Effektnamen der AWTRIX-3-Firmware
        (awtrix-light) — so sind Tippfehler ausgeschlossen.
      default: "PlasmaCloud"
      selector:
        select:
          options:
            - label: "Kein Effekt"
              value: "none"
            - label: "Fade"
              value: "Fade"
            - label: "MovingLine"
              value: "MovingLine"
            - label: "BrickBreaker"
              value: "BrickBreaker"
            - label: "PingPong"
              value: "PingPong"
            - label: "Radar"
              value: "Radar"
            - label: "Checkerboard"
              value: "Checkerboard"
            - label: "Fireworks"
              value: "Fireworks"
            - label: "PlasmaCloud"
              value: "PlasmaCloud"
            - label: "Ripple"
              value: "Ripple"
            - label: "Snake"
              value: "Snake"
            - label: "Pacifica"
              value: "Pacifica"
            - label: "TheaterChase"
              value: "TheaterChase"
            - label: "Plasma"
              value: "Plasma"
            - label: "Matrix"
              value: "Matrix"
            - label: "SwirlIn"
              value: "SwirlIn"
            - label: "SwirlOut"
              value: "SwirlOut"
            - label: "LookingEyes"
              value: "LookingEyes"
            - label: "TwinklingStars"
              value: "TwinklingStars"
            - label: "ColorWaves"
              value: "ColorWaves"

mode: single
max_exceeded: silent

variables:
  source_timer: !input source_timer
  awtrix_prefix: !input awtrix_prefix
  app_name: !input app_name
  display_mode: !input display_mode
  countdown_color: !input countdown_color
  countdown_icon: !input countdown_icon
  always_show_hours: !input always_show_hours
  alarm_text: !input alarm_text
  alarm_color: !input alarm_color
  alarm_blink: !input alarm_blink
  alarm_duration: !input alarm_duration
  alarm_effect: !input alarm_effect
  topic_custom: "{{ awtrix_prefix }}/custom/{{ app_name }}"
  topic_notify: "{{ awtrix_prefix }}/notify"
  topic_dismiss: "{{ awtrix_prefix }}/notify/dismiss"
  # Zielzeit des Timers als Unix-Zeit (beim Trigger gemerkt!). 0 = Sensor zeigt
  # keinen Zeitstempel (unavailable/kein Timer). Beim Ablauf "klebt" der Alexa-
  # Sensor auf ~jetzt; deshalb merken wir die echte Zielzeit beim Start der
  # Schleife und lösen exakt dann den Alarm aus.
  target_epoch: >
    {% set nt = states(source_timer) %}
    {% if nt not in ['unknown', 'unavailable', '', 'Kein Timer gestellt'] %}
      {% set t = as_datetime(nt) %}
      {{ (t.timestamp() | round(0)) if t is not none else 0 }}
    {% else %}
      0
    {% endif %}
  # Echter laufender Timer? Zielzeit liegt > 2 s in der Zukunft (verhindert, dass
  # der "klebende" ~jetzt-Wert beim Klingeln erneut als Countdown startet).
  counting: "{{ (target_epoch | float(0)) > 0 and (target_epoch | float(0)) - now().timestamp() > 2 }}"
  # Sensor zeigt gar keinen Zeitstempel (z. B. unavailable nach Abbruch/Dismiss).
  no_timer: "{{ (target_epoch | float(0)) == 0 }}"

triggers:
  # Nur bei Zustandsänderung des Alexa-Sensors (Timer gestellt/abgelaufen/
  # abgebrochen). KEIN Sekunden-Trigger -> im Leerlauf keine Last.
  - trigger: state
    entity_id: !input source_timer
    id: source
  # Nach HA-Neustart laufenden Timer wieder anzeigen.
  - trigger: homeassistant
    event: start
    id: hastart

conditions: []

actions:
  - choose:
      # ── Timer läuft: Countdown-Schleife (mode: single, nur 1×) ──────
      # Die Schleife nutzt die GEMERKTE Zielzeit (target_epoch). Sie endet, wenn
      # die Zielzeit erreicht ist ODER der Sensor keinen Timer mehr zeigt
      # (Abbruch). Danach wird je nach Grund Alarm gezeigt oder gelöscht.
      - conditions:
          - condition: template
            value_template: "{{ counting | bool }}"
        sequence:
          # Zielzeit EINMAL einfrieren (als Zahl gespeichert, ändert sich nicht).
          - variables:
              locked_target: "{{ target_epoch | float(0) }}"
          - repeat:
              while:
                # Zielzeit noch nicht erreicht ...
                - condition: template
                  value_template: "{{ locked_target - now().timestamp() > 0 }}"
                # ... UND der Timer wurde nicht abgebrochen (Sensor noch gültig).
                - condition: template
                  value_template: "{{ states(source_timer) not in ['unavailable', 'unknown', '', 'Kein Timer gestellt'] }}"
              sequence:
                - if:
                    - condition: template
                      value_template: "{{ display_mode == 'pinned' }}"
                  then:
                    # Angepinnt: gehaltene Notification, überdeckt andere Apps
                    - action: mqtt.publish
                      data:
                        topic: "{{ topic_notify }}"
                        payload: >-
                          {% set s = [locked_target - now().timestamp(), 0] | max | int %}
                          {% set h = s // 3600 %}{% set m = (s % 3600) // 60 %}{% set sec = s % 60 %}
                          {% set txt = ('%d:%02d:%02d' | format(h, m, sec)) if (always_show_hours or h > 0) else ('%02d:%02d' | format(m, sec)) %}
                          {"text":"{{ txt }}","color":{{ countdown_color | to_json }},"pushIcon":0,"hold":true,"stack":false,"wakeup":true{% if countdown_icon %},"icon":"{{ countdown_icon }}"{% endif %}}
                  else:
                    # Im App-Wechsel: Custom App
                    - action: mqtt.publish
                      data:
                        topic: "{{ topic_custom }}"
                        payload: >-
                          {% set s = [locked_target - now().timestamp(), 0] | max | int %}
                          {% set h = s // 3600 %}{% set m = (s % 3600) // 60 %}{% set sec = s % 60 %}
                          {% set txt = ('%d:%02d:%02d' | format(h, m, sec)) if (always_show_hours or h > 0) else ('%02d:%02d' | format(m, sec)) %}
                          {"text":"{{ txt }}","color":{{ countdown_color | to_json }},"pushIcon":0,"duration":5{% if countdown_icon %},"icon":"{{ countdown_icon }}"{% endif %}}
                - delay: "00:00:01"
          - choose:
              # Zielzeit erreicht -> regulärer Ablauf -> Alarm
              - conditions:
                  - condition: template
                    value_template: "{{ locked_target - now().timestamp() <= 0 }}"
                sequence:
                  - action: mqtt.publish
                    data:
                      topic: "{{ topic_notify }}"
                      payload: >-
                        {"text":"{{ alarm_text }}","color":{{ alarm_color | to_json }},"center":true,"duration":{{ alarm_duration }},"wakeup":true{% if alarm_blink %},"blinkText":700{% endif %}{% if alarm_effect not in ['none', '', None] %},"effect":"{{ alarm_effect }}"{% endif %}}
                  # Countdown-App entfernen (LOS ist eine eigene Notification)
                  - if:
                      - condition: template
                        value_template: "{{ display_mode == 'app' }}"
                    then:
                      - action: mqtt.publish
                        data:
                          topic: "{{ topic_custom }}"
                          payload: ""
            # Schleife endete vorzeitig (Timer abgebrochen) -> Anzeige löschen
            default:
              - if:
                  - condition: template
                    value_template: "{{ display_mode == 'pinned' }}"
                then:
                  - action: mqtt.publish
                    data: { topic: "{{ topic_dismiss }}", payload: "" }
                else:
                  - action: mqtt.publish
                    data: { topic: "{{ topic_custom }}", payload: "" }

      # ── Sensor zeigt keinen Timer (z. B. unavailable nach Dismiss): löschen ─
      # Während des Klingelns "klebt" der Sensor auf ~jetzt (kein 0-Wert) -> dieser
      # Zweig greift NICHT, der Alarm bleibt also stehen, bis der Timer auf Alexa
      # beendet wird (dann -> unavailable -> hier gelöscht).
      - conditions:
          - condition: template
            value_template: "{{ no_timer | bool }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ display_mode == 'pinned' }}"
            then:
              - action: mqtt.publish
                data: { topic: "{{ topic_dismiss }}", payload: "" }
            else:
              - action: mqtt.publish
                data: { topic: "{{ topic_custom }}", payload: "" }
    default: []
